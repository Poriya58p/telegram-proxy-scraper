name: Telegram Proxy Scraper

on:
  schedule:
    - cron: '0 0 * * *'  # اجرا هر روز در ساعت 00:00 UTC
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper
      run: python scraper.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'Poriya58p'
        git config --global user.email 'poriyaely1358@gmail.com'
        git add proxy.txt
        git commit -m "Update proxy.txt with latest proxies" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
